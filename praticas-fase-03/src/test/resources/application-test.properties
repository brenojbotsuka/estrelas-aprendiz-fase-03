# Banco de dados isolado em memória RAM para os testes năo quebrarem
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Desativa ou mocka o Redis para os testes se necessário
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Propriedades de segurança específicas e fixas para o ambiente de testes
api.security.token.secret=chave-de-teste-gerada-aleatoriamente-com-mais-de-256-bits-seguranca-total-para-o-algoritmo
api.security.token.expiration=3600000