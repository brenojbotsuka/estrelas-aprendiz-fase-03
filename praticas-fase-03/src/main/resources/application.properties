spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bank_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

spring.sql.init.mode=always
spring.application.name=praticas-fase-03
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.data.redis.host=localhost
spring.data.redis.port=6379

logistics.api.url=http://localhost:8089
redis.ttl.seconds=${REDIS_TTL_SECONDS:600}
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${JWT_EXPIRATION:3600000}
