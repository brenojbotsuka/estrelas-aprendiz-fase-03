spring.application.name=praticas-fase-03
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driverClassName=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Apague as propriedades spring.jpa.defer-datasource-initialization e spring.sql.init.mode

spring.data.redis.host=localhost
spring.data.redis.port=6379

logistics.api.url=http://localhost:8089
redis.ttl.seconds=${REDIS_TTL_SECONDS:600}